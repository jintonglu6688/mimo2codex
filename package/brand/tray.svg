<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!--
    Simplified tray-icon variant of the m2c logo.
    Designed for 16×16 / 32×32 / 48×48 rendering: no gradient (would muddy at
    small sizes), no internal padding (letters fill the icon), no fine detail.
    The big "m2" reads as a clear monogram even at 16px; the full "m2c" logo
    (in package/brand/logo.svg) stays the source for the larger app icon.
  -->
  <rect width="32" height="32" rx="5" ry="5" fill="#4F6CFB"/>
  <text x="16" y="24"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="22" font-weight="900" fill="#FFFFFF" text-anchor="middle"
        letter-spacing="-0.5">m2</text>
</svg>
